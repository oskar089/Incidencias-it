services:
  - type: web
    name: incidencias-it-backend
    env: node
    plan: free
    region: ohio  # Change to your preferred region
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true  # Render will generate a secure random string
      - key: DATABASE_PATH
        value: ./data/helpdesk.db
      - key: FRONTEND_URL
        value: https://incidencias-it-frontend.vercel.app  # UPDATE THIS after frontend deployment
      - key: TWILIO_ACCOUNT_SID
        sync: false  # Set manually in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: TWILIO_PHONE
        sync: false  # Set manually in Render dashboard
      - key: TECHNICIAN_PHONE
        sync: false  # Set manually in Render dashboard
    numInstances: 1
    autoDeploy: true
    branch: main  # Change if using a different branch

databases:
  - name: helpdesk-db
    databaseName: helpdesk
    plan: free
