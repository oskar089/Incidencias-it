services:
  - type: web
    name: incidencias-it-backend
    env: node
    plan: free
    region: ohio  # Change to your preferred region
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true  # Render will generate a secure random string
      - key: FRONTEND_URL
        value: https://incidencias-it-frontend.vercel.app
      - key: SUPABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false  # Set manually in Render dashboard
      - key: TWILIO_ACCOUNT_SID
        sync: false  # Set manually in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: TWILIO_PHONE
        sync: false  # Set manually in Render dashboard
      - key: TECHNICIAN_PHONE
        sync: false  # Set manually in Render dashboard
      - key: ADMIN_EMAIL
        value: admin@incidencias.com
      - key: ADMIN_PASSWORD
        value: Admin12345
    numInstances: 1
    autoDeploy: true
    branch: main
